<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vitamino_2022</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.cdnfonts.com/css/caviar-dreams" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --p:       #6A4D9B;
    --p-dark:  #4E3478;
    --p-mid:   #8B6FC4;
    --p-light: #EDE8F5;
    --p-pale:  #F8F5FF;
    --p-faint: #F3EFFE;
    --orange:  #F4860A;
    --red:     #E03030;
    --white:   #FFFFFF;
    --text:    #1A1A2E;
    --soft:    #7A6896;
    --border:  #DDD4F0;
    --gray-bg: #F6F6F8;
    --radius:  16px;
    --bar-h:   72px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(var(--bar-h) + 12px);
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--white);
    padding: 14px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 var(--border);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .logo {
    font-family: 'Caviar Dreams', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .logo em { color: var(--p); font-style: italic; }
  .logo-leaf { font-size: 18px; }

  .savat-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--p);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 9px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.2s;
  }
  .savat-btn:active { background: var(--p-dark); }
  .savat-count {
    background: white;
    color: var(--p);
    border-radius: 50%;
    width: 22px; height: 22px;
    font-size: 12px;
    font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── SEARCH ── */
  .search-wrap {
    background: var(--p-faint);
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .search-wrap span { font-size: 18px; }
  .search-wrap input {
    border: none;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    flex: 1;
    font-weight: 600;
  }
  .search-wrap input::placeholder { color: var(--soft); font-weight: 600; }

  /* ── CATEGORIES ── */
  .categories {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 14px;
    scrollbar-width: none;
  }
  .categories::-webkit-scrollbar { display: none; }
  .cat-btn {
    white-space: nowrap;
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    background: var(--white);
    color: var(--soft);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .cat-btn.active {
    background: var(--p);
    color: white;
    border-color: var(--p);
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 15px;
    font-weight: 800;
    padding: 14px 16px 10px;
    color: var(--text);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 0 12px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
    box-shadow: 0 2px 8px rgba(106,77,155,0.08);
  }
  .card:active { transform: scale(0.97); }

  .card-img-wrap {
    width: 100%;
    height: 140px;
    background: var(--p-light);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .card-img-emoji { font-size: 56px; line-height: 1; }

  .badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--red);
    color: white;
    font-size: 10px;
    font-weight: 900;
    border-radius: 8px;
    padding: 3px 8px;
    z-index: 2;
    letter-spacing: 0.5px;
  }

  .card-body { padding: 10px 10px 4px; }
  .card-name {
    font-size: 13px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-shop {
    font-size: 11px;
    color: var(--p-mid);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .card-price {
    font-size: 15px;
    font-weight: 900;
    color: var(--p);
    margin-bottom: 8px;
  }
  .card-price-from {
    font-size: 10px;
    font-weight: 600;
    color: var(--soft);
    display: block;
    margin-bottom: 1px;
  }
  .card-price-usd {
    font-size: 12px;
    font-weight: 700;
    color: #27ae60;
    margin-left: 3px;
  }

  .card-savatga {
    width: calc(100% - 0px);
    margin: 0 0 10px 0;
    padding: 9px 10px;
    border-radius: 10px;
    border: 1.5px solid var(--p);
    background: white;
    color: var(--p);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.18s;
    display: block;
    text-align: center;
  }
  .card-savatga:active {
    background: var(--p-light);
  }

  .card-add {
    position: absolute; bottom: 10px; right: 10px;
    width: 38px; height: 38px;
    background: var(--p); border-radius: 50%; border: none;
    color: white; font-size: 22px; font-weight: 700; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(106,77,155,0.40);
    transition: background 0.2s, transform 0.15s;
  }
  .card-add:active { transform: scale(0.88); background: var(--p-dark); }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--border);
    padding: 10px 16px 14px;
    display: flex; gap: 10px;
    z-index: 200;
    box-shadow: 0 -4px 20px rgba(106,77,155,0.10);
  }
  .btn-cart {
    position: relative; width: 52px; height: 52px;
    border-radius: 14px; border: 2px solid var(--p);
    background: white; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .btn-cart:active { background: var(--p-light); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--orange); color: white;
    font-size: 11px; font-weight: 900;
    width: 20px; height: 20px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .btn-order {
    flex: 1; height: 52px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--p-dark), var(--p-mid));
    color: white; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 900; cursor: pointer;
    box-shadow: 0 4px 16px rgba(106,77,155,0.30);
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-order:active { transform: scale(0.98); opacity: 0.92; }

  /* ── MODALS ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(30,15,60,0.52);
    z-index: 300; display: none;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 24px 24px 0 0;
    width: 100%; max-height: 92vh; overflow-y: auto;
    padding-bottom: 28px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 10px auto 16px;
  }

  .modal-image-wrap {
    position: relative; width: 100%; height: 260px;
    background: var(--p-light); overflow: hidden;
    display: flex; align-items: center; justify-content: center; cursor: zoom-in;
  }
  .modal-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .modal-image-emoji { font-size: 90px; line-height: 1; }

  .img-lang-pills {
    position: absolute; top: 10px; right: 10px;
    display: flex; gap: 6px; z-index: 5;
  }
  .img-lang-pill {
    padding: 4px 12px; border-radius: 20px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800;
    cursor: pointer; background: rgba(255,255,255,0.35); color: white;
    backdrop-filter: blur(6px); transition: all 0.2s;
  }
  .img-lang-pill.active { background: white; color: var(--p-dark); }

  .zoom-hint {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    background: rgba(78,52,120,0.70); color: white;
    font-size: 11px; font-weight: 700; padding: 4px 12px;
    border-radius: 20px; pointer-events: none; backdrop-filter: blur(4px);
  }

  .zoom-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.93);
    z-index: 500; display: none; align-items: center;
    justify-content: center; flex-direction: column;
  }
  .zoom-overlay.open { display: flex; }
  .zoom-overlay img { max-width: 100%; max-height: 88vh; object-fit: contain; border-radius: 12px; }
  .zoom-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.15); border: none; color: white;
    font-size: 26px; width: 42px; height: 42px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .modal-body { padding: 16px 16px 0; }
  .modal-name { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
  .modal-price-wrap { display: flex; align-items: baseline; gap: 8px; margin-bottom: 18px; }
  .modal-price { font-size: 22px; font-weight: 900; color: var(--p); transition: all 0.25s; }
  .modal-price.price-changed { transform: scale(1.08); color: var(--orange); }
  .modal-price-usd { font-size: 16px; font-weight: 800; color: #27ae60; }
  .modal-price-per { font-size: 12px; color: var(--soft); font-weight: 600; }

  /* pkg / brand / type blocks */
  .pkg-section { margin-bottom: 18px; }
  .pkg-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .pkg-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .pkg-btn {
    position: relative; padding: 10px 14px; border-radius: 14px;
    border: 2px solid var(--border); background: white;
    font-family: 'Nunito', sans-serif; cursor: pointer;
    transition: all 0.2s; text-align: center; min-width: 86px; flex: 1;
  }
  .pkg-btn.active {
    border-color: var(--p); background: var(--p-light);
    box-shadow: 0 2px 10px rgba(106,77,155,0.18);
  }
  .pkg-btn.best-value::after {
    content: attr(data-label); position: absolute;
    top: -9px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #F9A84D, #F4860A);
    color: white; font-size: 9px; font-weight: 900;
    padding: 2px 7px; border-radius: 8px; white-space: nowrap;
  }
  .pkg-qty { font-size: 15px; font-weight: 900; color: var(--text); display: block; line-height: 1.2; }
  .pkg-btn.active .pkg-qty { color: var(--p-dark); }
  .pkg-price { font-size: 12px; font-weight: 700; color: var(--soft); display: block; margin-top: 2px; }
  .pkg-btn.active .pkg-price { color: var(--p); }
  .pkg-price-usd { font-size: 11px; font-weight: 700; color: #27ae60; display: block; margin-top: 1px; }

  .form-type-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
  .type-options { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .type-btn {
    flex: 1; min-width: 72px; padding: 10px 8px; border-radius: 14px;
    border: 2px solid var(--border); background: white;
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; text-align: center; color: var(--soft);
  }
  .type-btn.active { border-color: var(--p); background: var(--p-light); color: var(--p-dark); }
  .type-icon { font-size: 20px; display: block; margin-bottom: 4px; }

  .brand-section { margin-bottom: 18px; }
  .brand-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .brand-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .brand-btn {
    position: relative; display: flex; align-items: center; gap: 7px;
    padding: 9px 14px; border-radius: 40px; border: 2px solid var(--border);
    background: white; font-family: 'Nunito', sans-serif; font-size: 13px;
    font-weight: 800; cursor: pointer; transition: all 0.2s;
    color: var(--soft); white-space: nowrap;
  }
  .brand-btn.active {
    border-color: var(--p); background: var(--p-light); color: var(--p-dark);
    box-shadow: 0 2px 10px rgba(106,77,155,0.18);
  }
  .brand-btn .brand-logo { font-size: 18px; flex-shrink: 0; }
  .brand-check {
    position: absolute; top: -6px; right: -6px; width: 18px; height: 18px;
    border-radius: 50%; background: var(--p-dark); color: white;
    font-size: 10px; display: none; align-items: center; justify-content: center; font-weight: 900;
  }
  .brand-btn.active .brand-check { display: flex; }
  .brand-price { font-size: 11px; color: var(--p-dark); font-weight: 900; margin-left: 2px; }

  .modal-actions { display: flex; gap: 10px; padding: 4px 16px 0; }
  .btn-add-cart {
    flex: 1; height: 50px; border-radius: 14px;
    border: 2px solid var(--p); background: white; color: var(--p-dark);
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-add-cart:active { background: var(--p-light); }
  .btn-order-now {
    flex: 1.4; height: 50px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--p-dark), var(--p-mid));
    color: white; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 900; cursor: pointer;
    box-shadow: 0 4px 16px rgba(106,77,155,0.30); transition: opacity 0.2s;
  }
  .btn-order-now:active { opacity: 0.88; }

  /* addr modal */
  .addr-modal {
    background: white; border-radius: 24px 24px 0 0;
    width: 100%; padding-bottom: 28px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .addr-title { font-size: 18px; font-weight: 900; color: var(--text); padding: 0 16px 12px; }
  .addr-subtitle { font-size: 13px; color: var(--soft); padding: 0 16px 18px; margin-top: -8px; line-height: 1.5; }
  .addr-field { padding: 0 16px 14px; }
  .addr-label { font-size: 13px; font-weight: 800; color: var(--p-dark); margin-bottom: 8px; display: block; }
  .addr-input {
    width: 100%; padding: 13px 16px; border: 2px solid var(--border);
    border-radius: 14px; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--text);
    outline: none; transition: border-color 0.2s; background: var(--p-faint);
  }
  .addr-input:focus { border-color: var(--p); background: white; }
  .addr-input::placeholder { color: #BBA8D8; }
  .addr-confirm {
    width: calc(100% - 32px); margin: 4px 16px 0; height: 52px;
    border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--p-dark), var(--p-mid));
    color: white; font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 900; cursor: pointer;
    box-shadow: 0 4px 16px rgba(106,77,155,0.30);
  }

  /* cart */
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--p-faint);
  }
  .cart-item-thumb {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--p-light); overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .cart-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-type { font-size: 12px; color: var(--soft); margin-top: 2px; }
  .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .cart-item-price { font-size: 14px; font-weight: 800; color: var(--p-dark); white-space: nowrap; }
  .cart-qty-row { display: flex; align-items: center; gap: 6px; }
  .cart-qty-btn {
    width: 28px; height: 28px; border-radius: 8px;
    border: 2px solid var(--border); background: white;
    font-size: 16px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--p-dark);
  }
  .cart-qty-btn:active { background: var(--p-light); border-color: var(--p); }
  .cart-qty-btn.remove { border-color: #FFD6CC; color: var(--orange); }
  .cart-qty-num { font-size: 15px; font-weight: 900; color: var(--text); min-width: 18px; text-align: center; }
  .cart-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px; font-size: 16px; font-weight: 900;
    background: var(--p-faint); margin: 8px 16px; border-radius: 14px;
  }
  .cart-empty { text-align: center; padding: 40px 16px; color: var(--soft); font-size: 15px; }
  .cart-empty-icon { font-size: 50px; margin-bottom: 12px; }

  .toast {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--p); color: white;
    padding: 12px 20px; border-radius: 50px;
    font-size: 14px; font-weight: 700; z-index: 999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; box-shadow: 0 4px 20px rgba(106,77,155,0.40);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo"><span class="logo-v">V</span>itamino<span class="logo-year">_2022</span> 🌸</div>
  </div>
  <div class="categories" id="categories"></div>
</div>

<div class="section-title" id="sectionTitle">Barcha vitaminlar</div>
<div class="grid" id="grid"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn-cart" onclick="openCart()">
    🛒
    <span class="cart-badge" id="cartBadge">0</span>
  </button>
  <button class="btn-order" onclick="startOrder()">📦 Buyurtma berish</button>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" onclick="handleOverlayClick(event,'detailModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-image-wrap" id="modalImageWrap" onclick="openZoom()">
      <div class="img-lang-pills" id="imgLangPills">
        <button class="img-lang-pill active" id="imgLangUz" onclick="event.stopPropagation();setImgLang('uz')">🇺🇿 UZ</button>
        <button class="img-lang-pill" id="imgLangRu" onclick="event.stopPropagation();setImgLang('ru')">🇷🇺 RU</button>
      </div>
      <div class="zoom-hint" id="zoomHint">🔍 Rasm bosing — zoom</div>
    </div>
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-price-wrap">
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-price-usd" id="modalPriceUsd"></div>
        <div class="modal-price-per" id="modalPricePer"></div>
      </div>
      <div class="brand-section" id="brandBlock">
        <div class="brand-title">🏷️ <span id="brandTitle">Brendni tanlang:</span></div>
        <div class="brand-options" id="brandOptions"></div>
      </div>
      <div class="pkg-section" id="pkgBlock">
        <div class="pkg-title">📦 <span id="pkgTitle">Miqdorni tanlang:</span></div>
        <div class="pkg-options" id="pkgOptions"></div>
      </div>
      <div id="typeBlock">
        <div class="form-type-title" id="formTypeTitle">Shaklini tanlang:</div>
        <div class="type-options" id="typeOptions"></div>

// ── IMAGE PROXY ───────────────────────────────────────────────────────────
// Barcha rasmlar wsrv.nl CDN orqali yuklanadi — Telegram blok qilmaydi
function proxyImg(url) {
  if (!url) return null;
  // URL allaqachon wsrv.nl formatida bo'lsa, shundayligicha qaytaramiz
  if (url.includes('wsrv.nl')) return url;
  // Yangi URL bo'lsa, proxy orqali o'tkazamiz
  return 'https://wsrv.nl/?url=' + encodeURIComponent(url) + '&w=800&q=95&output=webp';
}
// Wsrv.nl URL dan original URL ni ajratib olamiz (fallback uchun)
function extractOriginalUrl(wsrvUrl) {
  if (!wsrvUrl || !wsrvUrl.includes('wsrv.nl')) return wsrvUrl;
  try {
    const match = wsrvUrl.match(/[?&]url=([^&]+)/);
    if (match) return decodeURIComponent(match[1]);
  } catch(e) {}
  return null;
}

function pkgUnit(pk) {

  if (pk.unit === '') return '';   // bo'sh: faqat son ko'rinadi

function t(key) { return translations.uz[key]; }

function renderCategories() {
  document.getElementById('categories').innerHTML = categories.map(c =>
    `<button class="cat-btn ${selectedCat === c.key ? 'active' : ''}" onclick="selectCat('${c.key}')">${c.uz}</button>`
  ).join('');
}
function selectCat(key) { selectedCat = key; renderCategories(); renderProducts(); }

function getMinPrice(p) {
  if (p.hasBrands && p.brands.length > 0) {
    const brandPrices = p.brands.filter(b => b.price != null).map(b => b.price);
    if (brandPrices.length > 0) return Math.min(...brandPrices);
  }
  const prices = p.packages.map(pk => pk.price).filter(v => v != null);
  return prices.length > 0 ? Math.min(...prices) : null;
}

function getMinPriceUsd(p) {
  const prices = p.packages.map(pk => pk.priceUsd).filter(v => v != null);
  if (prices.length === 0) return null;
  return Math.min(...prices);
}

function renderProducts() {
  const filtered = selectedCat === 'hammasi' ? products : products.filter(p => p.cat === selectedCat);
  document.getElementById('grid').innerHTML = filtered.map(p => {
    const info = p.uz;
    const imgUrl = proxyImg(p.imageUz);
    const imgTag = imgUrl
      ? `<img src="${imgUrl}" alt="${info.name}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" onerror="var o=extractOriginalUrl(this.src);if(o&&this.src!==o){this.onerror=function(){this.style.display='none';this.parentNode.innerHTML='<span class=\\'card-img-emoji\\'>${p.emoji||'💊'}</span>';};this.src=o;}else{this.style.display='none';this.parentNode.innerHTML='<span class=\\'card-img-emoji\\'>${p.emoji||'💊'}</span>';}">`
      : `<span class="card-img-emoji">${p.emoji||'💊'}</span>`;
    const minPrice = getMinPrice(p);
    const minPriceUsd = getMinPriceUsd(p);
    const showFrom = (p.hasPackages && p.packages.length > 1) || (p.hasBrands && p.brands.length > 1);
    return `
    <div class="card" onclick="openDetail(${p.id})">
      ${p.badge ? `<div class="badge">${p.badge}</div>` : ''}
      <div class="card-img-wrap">${imgTag}</div>
      <div class="card-body">
        <div class="card-name">${info.name}</div>
        <div class="card-sub">${info.sub}</div>
        <div class="card-price">
          ${showFrom ? `<span class="card-price-from">${t('fromPrice')}</span>` : ''}
          ${minPrice != null ? `${minPrice.toLocaleString()} ${t('currency')}` : ''}
          ${minPriceUsd != null ? `<span class="card-price-usd">${minPrice != null ? '/ ' : ''}$${minPriceUsd}</span>` : ''}
        </div>
      </div>
      <button class="card-add" onclick="quickAdd(event,${p.id})">+</button>
    </div>`;
  }).join('');
}

function renderModalImage(p, il) {
  const wrap = document.getElementById('modalImageWrap');
  const pills = document.getElementById('imgLangPills');
  const hint = document.getElementById('zoomHint');
  Array.from(wrap.children).forEach(child => {
    if (child !== pills && child !== hint) child.remove();
  });
  const ruPill = document.getElementById('imgLangRu');
  if (ruPill) ruPill.style.display = p.hasImageRu ? '' : 'none';
  let rawUrl = il === 'ru' ? (p.hasImageRu ? p.imageRu : p.imageUz) : p.imageUz;
  let url = proxyImg(rawUrl);
  if (url) {
    const img = document.createElement('img');
    img.src = url; img.alt = p.uz.name; img.id = 'modalImg';
    img.onerror = () => {
      const orig = extractOriginalUrl(img.src);
      if (orig && img.src !== orig) {
        img.onerror = () => {
          img.remove();
          const em2 = document.createElement('div');
          em2.className = 'modal-image-emoji'; em2.textContent = p.emoji||'💊';
          wrap.insertBefore(em2, pills);
          hint.style.display = 'none';
        };
        img.src = orig;
      } else {
        img.remove();
        const em = document.createElement('div');
        em.className = 'modal-image-emoji'; em.textContent = p.emoji||'💊';
        wrap.insertBefore(em, pills);
        hint.style.display = 'none';
      }
    };
    wrap.insertBefore(img, pills);
    hint.style.display = '';
  } else {
    const em = document.createElement('div');
    em.className = 'modal-image-emoji'; em.textContent = p.emoji||'💊';
    wrap.insertBefore(em, pills);
    hint.style.display = 'none';
  }
}

function openZoom() {
  const img = document.getElementById('modalImg');
  if (!img) return;
  document.getElementById('zoomImg').src = img.src;
  document.getElementById('zoomOverlay').classList.add('open');
}
function closeZoom() { document.getElementById('zoomOverlay').classList.remove('open'); }

function renderBrandOptions(p) {
  document.getElementById('brandOptions').innerHTML = p.brands.map((br, i) => `
    <button class="brand-btn ${i === selectedBrandIndex ? 'active' : ''}" onclick="selectBrand(${i})">
      <span class="brand-check">✓</span>
      <span class="brand-logo">${br.logo}</span>
      <span class="brand-name">${br.nameUz}</span>
      ${br.price != null ? `<span class="brand-price">${br.price.toLocaleString()} so'm</span>` : ''}
    </button>`).join('');
}

function selectBrand(i) {
  selectedBrandIndex = i;
  renderBrandOptions(currentProduct);
  const br = currentProduct.brands[i];
  if (br && br.price != null) {
    currentProduct.packages[selectedPkgIndex].price = br.price;
  }
  updateModalPrice();
}

function renderPkgOptions(p) {
  document.getElementById('pkgOptions').innerHTML = p.packages.map((pk, i) => {
    const unit = pkgUnit(pk);
    const qtyLabel = unit ? `${pk.qty} ${unit}` : `${pk.qty}`;
    return `
    <button class="pkg-btn ${i === selectedPkgIndex ? 'active' : ''} ${pk.bestValue ? 'best-value' : ''}"
      data-label="${t('pkgBestValue')}" onclick="selectPkg(${i})">
      <span class="pkg-qty">${qtyLabel}</span>
      <span class="pkg-price">${pk.price != null ? `${pk.price.toLocaleString()} ${t('currency')}` : ''}</span>
      ${pk.priceUsd != null ? `<span class="pkg-price-usd">$${pk.priceUsd}</span>` : ''}
    </button>`;
  }).join('');
}
function selectPkg(i) { selectedPkgIndex = i; renderPkgOptions(currentProduct); updateModalPrice(); }

function updateModalPrice() {
  if (!currentProduct) return;
  const pkg = currentProduct.packages[selectedPkgIndex];
  const priceEl = document.getElementById('modalPrice');
  const usdEl = document.getElementById('modalPriceUsd');

  priceEl.textContent = pkg.price != null
    ? `${pkg.price.toLocaleString()} ${t('currency')}`
    : '';

  if (pkg.priceUsd != null) {
    usdEl.textContent = `$${pkg.priceUsd}`;
    usdEl.style.display = '';
  } else {
    usdEl.textContent = '';
    usdEl.style.display = 'none';
  }

  priceEl.classList.remove('price-changed');
  void priceEl.offsetWidth;
  priceEl.classList.add('price-changed');
  setTimeout(() => priceEl.classList.remove('price-changed'), 400);
  document.getElementById('modalPricePer').textContent = '';
}

function renderTypeOptions(p) {
  const typeBlock = document.getElementById('typeBlock');
  const typeOptions = document.getElementById('typeOptions');
  if (!p.types || p.types.length === 0) {
    typeBlock.style.display = 'none';
    selectedType = null;
    return;
  }
  typeBlock.style.display = '';
  document.getElementById('formTypeTitle').textContent = t('formType');
  typeOptions.innerHTML = p.types.map(key => {
    const meta = TYPE_META[key];
    return `<button class="type-btn ${selectedType === key ? 'active' : ''}" onclick="selectType('${key}')">
      <span class="type-icon">${meta.icon}</span>
      ${meta.uz}
    </button>`;
  }).join('');
}
function selectType(type) {
  selectedType = type;
  renderTypeOptions(currentProduct);
}

function openDetail(id) {
  currentProduct = products.find(p => p.id === id);
  imgLang = 'uz';
  selectedType = currentProduct.types && currentProduct.types.length > 0 ? currentProduct.types[0] : null;
  selectedPkgIndex = 0;
  selectedBrandIndex = 0;
  if (currentProduct.hasBrands && currentProduct.brands.length > 0 && currentProduct.brands[0].price != null) {
    currentProduct.packages[0].price = currentProduct.brands[0].price;
  }
  populateModal(currentProduct);
  document.getElementById('detailModal').classList.add('open');
}

function populateModal(p) {
  renderModalImage(p, imgLang);
  document.getElementById('modalName').textContent = p.uz.name;
  const brandBlock = document.getElementById('brandBlock');
  if (p.hasBrands && p.brands.length > 0) {
    brandBlock.style.display = '';
    document.getElementById('brandTitle').textContent = t('brandTitle');
    renderBrandOptions(p);
  } else { brandBlock.style.display = 'none'; }
  const pkgBlock = document.getElementById('pkgBlock');
  if (p.hasPackages) {
    pkgBlock.style.display = '';
    document.getElementById('pkgTitle').textContent = t('pkgTitle');
    renderPkgOptions(p);
  } else { pkgBlock.style.display = 'none'; }
  updateModalPrice();
  document.getElementById('btnAddCart').textContent = t('addCart');
  document.getElementById('btnOrderNow').textContent = t('orderNow');
  document.getElementById('imgLangUz').classList.toggle('active', imgLang === 'uz');
  document.getElementById('imgLangRu').classList.toggle('active', imgLang === 'ru');
  const hint = document.getElementById('zoomHint');
  if (hint) hint.textContent = t('zoomHint');
  renderTypeOptions(p);
}

function setImgLang(l) { imgLang = l; if (currentProduct) populateModal(currentProduct); }

function getSelectedBrand(p, brandIndex) {
  if (!p.hasBrands || !p.brands.length) return null;
  return p.brands[brandIndex] || null;
}

function quickAdd(e, id) {
  e.stopPropagation();
  const p = products.find(x => x.id === id);
  const pkg = p.packages[0];
  const type = p.types && p.types.length > 0 ? p.types[0] : null;
  addItem(p, type, 0, pkg, getSelectedBrand(p, 0), 0);
  showToast(t('toastAdded'));
}
function addToCart() {
  if (!currentProduct) return;
  const pkg = currentProduct.packages[selectedPkgIndex];
  addItem(currentProduct, selectedType, selectedPkgIndex, pkg, getSelectedBrand(currentProduct, selectedBrandIndex), selectedBrandIndex);
  closeModal('detailModal');
  showToast(t('toastAdded'));
}
function addItem(p, type, pkgIndex, pkg, brand, brandIndex) {
  const key = `${p.id}-${type}-${pkgIndex}-${brand ? brand.id : 'none'}`;
  const existing = cart.find(i => i.key === key);
  if (existing) { existing.qty++; }
  else { cart.push({ key, id: p.id, type, pkgIndex, pkg: {...pkg}, qty: 1, product: p, brand, brandIndex }); }
  updateCartBadge();
}
function updateCartBadge() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

function typeLabel(type) {
  if (!type || !TYPE_META[type]) return '';
  return TYPE_META[type].uz;
}

function openCart() { renderCart(); document.getElementById('cartModal').classList.add('open'); }

function renderCart() {
  const container = document.getElementById('cartItems');
  const totalEl = document.getElementById('cartTotal');
  const orderBtn = document.getElementById('cartOrderBtn');
  document.getElementById('cartTitle').textContent = t('cartTitle');
  document.getElementById('totalLabel').textContent = t('total');
  if (cart.length === 0) {
    container.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div>${t('emptyCart')}</div>`;
    totalEl.style.display = 'none'; orderBtn.style.display = 'none'; return;
  }
  container.innerHTML = cart.map(item => {
    const imgUrl = proxyImg(item.product.imageUz);
    const thumb = imgUrl ? `<img src="${imgUrl}" alt="${item.product.uz.name}">` : item.product.emoji||'💊';
    const unit = pkgUnit(item.pkg);
    const qtyLabel = unit ? `${item.pkg.qty} ${unit}` : `${item.pkg.qty}`;
    const pkgLabel = item.product.hasPackages ? `📦 ${qtyLabel}` : '';
    const typePart = typeLabel(item.type) ? ` · ${TYPE_META[item.type].icon} ${typeLabel(item.type)}` : '';
    const brandPart = item.brand ? ` · ${item.brand.logo} ${item.brand.nameUz}` : '';
    const subInfo = [pkgLabel, typePart, brandPart].filter(Boolean).join('');
    const usdPart = item.pkg.priceUsd != null
      ? `<span style="font-size:11px;color:#27ae60;font-weight:700;">$${item.pkg.priceUsd * item.qty}</span>` : '';
    return `
    <div class="cart-item">
      <div class="cart-item-thumb">${thumb}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.product.uz.name}</div>
        ${subInfo ? `<div class="cart-item-type">${subInfo}</div>` : ''}
      </div>
      <div class="cart-item-right">
        <div class="cart-item-price">
          ${item.pkg.price != null ? `${(item.pkg.price * item.qty).toLocaleString()} ${t('currency')}` : ''}
          ${usdPart}
        </div>
        <div class="cart-qty-row">
          <button class="cart-qty-btn remove" onclick="changeQty('${item.key}', -1)">−</button>
          <span class="cart-qty-num">${item.qty}</span>
          <button class="cart-qty-btn" onclick="changeQty('${item.key}', +1)">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
  const total = cart.reduce((s, i) => s + (i.pkg.price != null ? i.pkg.price * i.qty : 0), 0);
  const totalUsd = cart.reduce((s, i) => s + (i.pkg.priceUsd != null ? i.pkg.priceUsd * i.qty : 0), 0);
  const hasUsd = cart.some(i => i.pkg.priceUsd != null);
  const hasSom = total > 0;
  document.getElementById('totalPrice').innerHTML =
    (hasSom ? `${total.toLocaleString()} ${t('currency')}` : '') +
    (hasUsd ? ` <span style="color:#27ae60;font-size:14px;">/ $${totalUsd}</span>` : '');
  totalEl.style.display = 'flex'; orderBtn.style.display = 'block';
}
function changeQty(key, delta) {
  const item = cart.find(i => i.key === key);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.key !== key);
  updateCartBadge(); renderCart();
}

function openAddrModal() {
  document.getElementById('addrTitle').textContent = t('addrTitle');
  document.getElementById('addrSubtitle').textContent = t('addrSubtitle');
  document.getElementById('addrLocLabel').textContent = t('addrLocLabel');
  document.getElementById('addrPhoneLabel').textContent = t('addrPhoneLabel');
  document.getElementById('addrInput').placeholder = t('addrPlaceholderLoc');
  document.getElementById('phoneInput').placeholder = t('addrPlaceholderPhone');
  document.getElementById('addrConfirmBtn').textContent = t('addrConfirm');
  document.getElementById('addrModal').classList.add('open');
}
function startOrder() {
  if (cart.length === 0) { openCart(); return; }
  closeModal('cartModal'); pendingOrderItems = [...cart]; openAddrModal();
}
function orderNowDetail() {
  if (!currentProduct) return;
  const pkg = currentProduct.packages[selectedPkgIndex];
  const brand = getSelectedBrand(currentProduct, selectedBrandIndex);
  pendingOrderItems = [{
    key: `${currentProduct.id}-${selectedType}-${selectedPkgIndex}-${brand ? brand.id : 'none'}`,
    id: currentProduct.id, type: selectedType, pkgIndex: selectedPkgIndex,
    pkg: {...pkg}, qty: 1, product: currentProduct, brand, brandIndex: selectedBrandIndex,
  }];
  closeModal('detailModal'); openAddrModal();
}
function confirmOrder() {
  const location = document.getElementById('addrInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();
  if (!location) { showToast(t('addrErrorLoc')); return; }
  if (!phone) { showToast(t('addrErrorPhone')); return; }
  sendOrderToBot(pendingOrderItems, location, phone);
  cart = []; updateCartBadge(); closeModal('addrModal');
  document.getElementById('addrInput').value = '';
  document.getElementById('phoneInput').value = '';
  showToast(t('toastOrdering'));
}

function buildOrderPayload(items, location, phone) {
  const user = tg?.initDataUnsafe?.user;
  return {
    user: { id: user?.id||null, username: user?.username||null, firstName: user?.first_name||null, phone },
    delivery: { location, phone },
    items: items.map(i => {
      const tm = i.type && TYPE_META[i.type] ? TYPE_META[i.type] : null;
      const unit = pkgUnit(i.pkg);
      return {
        id:           i.product.id,
        nameUz:       i.product.uz.name,
        nameRu:       i.product.ru.name,
        qty:          i.qty,
        packageQty:   i.pkg.qty,
        packageUnit:  unit,
        type:         i.type,
        typeUz:       tm ? tm.uz : '',
        typeRu:       tm ? tm.ru : '',
        pricePerPkg:  i.pkg.price    != null ? i.pkg.price    : null,
        priceUsd:     i.pkg.priceUsd != null ? i.pkg.priceUsd : null,
        subtotal:     i.pkg.price    != null ? i.pkg.price * i.qty : 0,
        subtotalUsd:  i.pkg.priceUsd != null ? i.pkg.priceUsd * i.qty : null,
        imageUz:      i.product.imageUz || null,
        imageRu:      i.product.imageRu || null,
        emoji:        i.product.emoji,
        brand: i.brand
          ? { id: i.brand.id, nameUz: i.brand.nameUz, nameRu: i.brand.nameRu, country: i.brand.country }
          : null,
      };
    }),
    total:    items.reduce((s, i) => s + (i.pkg.price    != null ? i.pkg.price    * i.qty : 0), 0),
    totalUsd: items.reduce((s, i) => s + (i.pkg.priceUsd != null ? i.pkg.priceUsd * i.qty : 0), 0),
    lang: 'uz',
  };
}
function sendOrderToBot(items, location, phone) {
  if (!tg) { console.log('Order:', JSON.stringify(buildOrderPayload(items, location, phone), null, 2)); return; }
  tg.sendData(JSON.stringify(buildOrderPayload(items, location, phone)));
}

function handleOverlayClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

renderCategories();
renderProducts();
</script>
</body>
